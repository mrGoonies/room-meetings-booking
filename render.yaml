services:
  - type: web
    name: app-meetingroom
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level info"
    envVars:
      # ── Django core ──────────────────────────────────────────────────────────
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── Base de datos ────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: meetingroom-db
          property: connectionString

      # ── Negocio ──────────────────────────────────────────────────────────────
      - key: COMPANY_NAME
        value: "Irritec"
      - key: RECEPTION_EMAIL
        sync: false   # completar en el dashboard: recepcion.chile@irritec.com

      # ── Email (Mandrill HTTP API vía Anymail) ────────────────────────────────
      - key: EMAIL_BACKEND
        value: "anymail.backends.mandrill.EmailBackend"
      - key: DEFAULT_FROM_EMAIL
        sync: false   # completar en el dashboard: recepcion.chile@irritec.com
      - key: MANDRILL_API_KEY
        sync: false   # completar en el dashboard: md-xxxxxxxxxxxxxxxxxxxx

databases:
  - name: meetingroom-db
    databaseName: meetingroom
    user: meetingroom_user
    plan: free
