services:
  - type: web
    name: app-meetingroom
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: COMPANY_NAME
        value: "Irritec"
      - key: DATABASE_URL
        fromDatabase:
          name: meetingroom-db
          property: connectionString
      - key: DJANGO_ADMIN_USER
        value: admin
      - key: DJANGO_ADMIN_EMAIL
        value: "admin@irritec.com"
      - key: DJANGO_ADMIN_PASSWORD
        generateValue: true
      # Email — completar manualmente en el dashboard de Render
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.mandrillapp.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

databases:
  - name: meetingroom-db
    databaseName: meetingroom
    user: meetingroom_user
    plan: free
