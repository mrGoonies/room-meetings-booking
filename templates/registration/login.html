{% extends 'base.html' %}
{% load static %}
{% block title %}Iniciar sesión — Irritec{% endblock %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

      <div class="text-center mb-8">
        <img src="{% static 'img/Irritec.webp' %}" alt="Irritec" class="h-12 mx-auto mb-5">
        <p class="text-sm text-gray-400">Ingresa con tu cuenta</p>
      </div>

      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4">
        Usuario o contraseña incorrectos.
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
          <input type="text" name="username" autofocus autocomplete="username"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input type="password" name="password" autocomplete="current-password"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-shadow">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
          class="w-full bg-brand text-white py-2 rounded-lg text-sm font-medium
                 hover:bg-brand-dark active:bg-brand-dark transition-colors mt-2">
          Iniciar sesión
        </button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
