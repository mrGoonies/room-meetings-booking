{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Salas de Reuniones — Irritec{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#1B6535',
              dark:    '#134D26',
              light:   '#2D8448',
              50:      '#EBF5EF',
              100:     '#C6E3CF',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-20 shadow-sm">

    <!-- Logo + app name -->
    <a href="/" class="flex items-center gap-4">
      <img src="{% static 'img/Irritec.webp' %}" alt="Irritec" class="h-9">
      <span class="hidden sm:block text-sm font-medium text-gray-400 border-l border-gray-200 pl-4">
        Salas de Reuniones
      </span>
    </a>

    {% if user.is_authenticated %}
    <div class="flex items-center gap-4">
      <a href="{% url 'rooms:booking_create' %}"
         class="bg-brand text-white text-sm px-4 py-1.5 rounded-lg hover:bg-brand-dark transition-colors font-medium">
        + Nueva reserva
      </a>
      <div class="h-5 w-px bg-gray-200"></div>
      <span class="text-sm text-gray-500 hidden sm:block">
        {{ user.get_full_name|default:user.username }}
      </span>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
          Salir
        </button>
      </form>
    </div>
    {% endif %}
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
