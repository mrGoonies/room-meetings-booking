{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="300"> <!-- auto-refresh cada 5 minutos -->
  <title>Disponibilidad de Salas — Irritec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#1B6535',
              dark:    '#134D26',
              light:   '#2D8448',
              50:      '#EBF5EF',
              100:     '#C6E3CF',
            }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Header compacto solo lectura -->
  <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-4">
      <img src="{% static 'img/Irritec.webp' %}" alt="Irritec" class="h-9">
      <span class="hidden sm:block text-sm font-medium text-gray-400 border-l border-gray-200 pl-4">
        Disponibilidad de Salas
      </span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Badge solo lectura -->
      <span class="inline-flex items-center gap-1.5 text-xs font-medium text-brand bg-brand-50 px-3 py-1 rounded-full">
        <span class="w-1.5 h-1.5 rounded-full bg-brand inline-block"></span>
        Solo lectura
      </span>
      <div class="h-5 w-px bg-gray-200"></div>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">
          Salir
        </button>
      </form>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
    <div id="calendar-content">
      {% include 'rooms/partials/calendar_grid.html' %}
    </div>
  </main>

</body>
</html>
